<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Koszyk</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            padding: 4px 10px;
        }

        .right {
            text-align: right;
        }

        .sum {
            font-weight: bold;
            border-top: 1px solid black;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td>Produkt 1</td>
        <td class="right">4 × 5.20 zł</td>
        <td class="right">=</td>
        <td class="right">20.80 zł</td>
    </tr>

    <tr>
        <td>Produkt 2</td>
        <td class="right">1 × 9.99 zł</td>
        <td class="right">=</td>
        <td class="right">9.99 zł</td>
    </tr>

    <tr>
        <td>Produkt 3</td>
        <td class="right">1 × 2.20 zł</td>
        <td class="right">=</td>
        <td class="right">2.20 zł</td>
    </tr>

    <tr>
        <td colspan="3" class="right sum">SUMA:</td>
        <td class="right sum">32.99 zł</td>
    </tr>
</table>

</body>
</html>
